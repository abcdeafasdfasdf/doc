name: Scheduled API Spec Pull Sync
on:
  schedule:
    - cron: '0 0 * * 0' # Weekly at midnight on Sunday
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual sync reason"
        default: "Manual weekly refresh"

jobs:
  pull-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout Central Repo
        uses: actions/checkout@v4
        with:
          path: central-repo
          token: ${{ steps.generate_token.outputs.token }}

      - name: Run Sync Script
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          cd central-repo
          git config user.name "API Sync Bot"
          git config user.email "bot@docs.com"
          
          # Read the JSON registry
          SERVICES=$(cat services-registry.json | jq -c '.[]')
          
          ANY_CHANGES=false

          for row in $SERVICES; do
            NAME=$(echo ${row} | jq -r '.name')
            REPO=$(echo ${row} | jq -r '.repo')
            SRC=$(echo ${row} | jq -r '.source_path')
            DEST_PATH=$(echo ${row} | jq -r '.target_path')

            echo "--- Processing $NAME ($REPO) ---"

            # 1. Clone service repo into a temp folder
            git clone --depth 1 "https://x-access-token:$GH_TOKEN@github.com/$REPO.git" temp_service_repo

            # 2. Check if source file exists
            if [ -f "temp_service_repo/$SRC" ]; then
              mkdir -p "api-reference$DEST_PATH"
              
              # 3. Copy file
              cp "temp_service_repo/$SRC" "api-reference$DEST_PATH/spec.yaml"
              
              # 4. Check for changes
              git add "api-reference$DEST_PATH/spec.yaml"
              if ! git diff --cached --quiet; then
                echo "Changes detected for $NAME"
                git commit -m "sync($NAME): update spec from $REPO"
                ANY_CHANGES=true
              else
                echo "No changes for $NAME"
              fi
            else
              echo "Warning: Source $SRC not found in $REPO"
            fi

            # Clean up temp folder for next iteration
            rm -rf temp_service_repo
          done

          # ── 5. Push all changes at once ─────────────────────────────────────
          if [ "$ANY_CHANGES" = true ]; then
            echo "Pushing all accumulated changes..."
            git pull origin main --rebase
            git push origin main
          else
            echo "Everything is already up to date."
          fi
