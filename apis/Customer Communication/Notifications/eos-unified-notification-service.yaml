openapi: 3.0.3
info:
  title: EOS Unified Notification Service API
  description: |
    Centralized backend service for sending notifications (email, push, SMS).
    This specification covers three main services:
    1. Notification Ingester - Email notification ingestion endpoint
    2. Logger Service - Status retrieval and metrics endpoints
    3. Channel Response Processor - SendGrid webhook callback endpoint
    
    **How to use:**
    - Select your environment from the server dropdown at the top
    - The environment selection applies globally to all endpoints
    - Each service (uns, uns-logger, uns-crp) uses the same environment
  version: 1.0.0
  contact:
    name: EOS Development Team
  license:
    name: Proprietary

servers:
  - url: https://dev-platform-ae.azure-api.net
    description: Development (AE)
  - url: https://tst-platform-ne.azure-api.net
    description: Test (NE)
  - url: https://stg-platform-ae.azure-api.net
    description: Staging (AE)
  - url: https://stg-platform-ne.azure-api.net
    description: Staging (NE)
  - url: https://prd-platform-ne.azure-api.net
    description: Production (NE)

tags:
  - name: Notifications
    description: Email notification operations (Notification Ingester Service)
  - name: Status
    description: Notification status and metrics operations (Logger Service)
  - name: Webhooks
    description: External webhook callbacks from notification channels (Channel Response Processor)

paths:
  /uns/notifications/v1/email:
    post:
      tags:
        - Notifications
      summary: Send Email Notification
      description: |
        Ingests email notification request(s) and queues them for processing.
        Supports sending emails to multiple recipients with personalization.
      operationId: ingestEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationRequest'
      responses:
        "200":
          description: Notification successfully ingested and queued for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationIngestResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /uns-logger/api/getStatus:
    get:
      tags:
        - Status
      summary: Get Notification Status
      description: Returns the current state and recipient breakdown for a specific notification.
      operationId: getNotificationStatus
      parameters:
        - name: id
          in: query
          required: true
          description: Notification ID to retrieve status for
          schema:
            type: string
      responses:
        "200":
          description: Successfully retrieved notification status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationStatusResponse'
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /uns-logger/api/metrics:
    get:
      tags:
        - Status
      summary: Get Aggregated Metrics
      description: Returns aggregated metrics including total notifications sent.
      operationId: getMetrics
      responses:
        "200":
          description: Successfully retrieved metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /uns-crp/v1/sendgrid/status:
    post:
      tags:
        - Webhooks
      summary: SendGrid Event Webhook Callback
      description: Receives webhook callbacks from SendGrid containing email delivery events.
      operationId: handleSendGridCallback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SendGridEvent'
      responses:
        "200":
          description: Webhook successfully received and queued for processing
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    NotificationRequest:
      type: object
      required:
        - from
        - type
        - subject
        - rawMessage
        - personalizations
      properties:
        from:
          $ref: '#/components/schemas/From'
        type:
          type: string
          enum:
            - transactional
            - promotional
            - marketing
        subject:
          type: string
        rawMessage:
          type: string
        personalizations:
          $ref: '#/components/schemas/RecipientGroups'

    From:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        name:
          type: string

    RecipientGroups:
      type: object
      required:
        - to
      properties:
        to:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Recipient'
        cc:
          type: array
          items:
            $ref: '#/components/schemas/Recipient'
        bcc:
          type: array
          items:
            $ref: '#/components/schemas/Recipient'

    Recipient:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        name:
          type: string

    NotificationIngestResponse:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
        status:
          type: string
          enum:
            - Accepted

    ErrorResponse:
      type: object
      required:
        - statusCode
        - message
        - timestamp
      properties:
        statusCode:
          type: integer
        message:
          type: string
        timestamp:
          type: integer
          format: int64

    NotificationStatusResponse:
      type: object
      required:
        - notificationId
        - currentStatus
        - message
        - lastUpdated
      properties:
        notificationId:
          type: string
          description: Unique identifier for the notification
        currentStatus:
          type: string
          description: Current status of the notification
        message:
          type: string
          description: Detailed message with status history
        lastUpdated:
          type: integer
          format: int64
          description: Timestamp of the last update (Unix epoch milliseconds)

    MetricsResponse:
      type: object
      required:
        - totalEmailsSent
        - emailsDelivered
        - emailsBounced
        - emailsOpened
      properties:
        totalEmailsSent:
          type: integer
          description: Total number of emails sent
        emailsDelivered:
          type: integer
          description: Number of emails successfully delivered
        emailsBounced:
          type: integer
          description: Number of emails that bounced
        emailsOpened:
          type: integer
          description: Number of emails that were opened

    SendGridEvent:
      type: object
      properties:
        email:
          type: string
          format: email
        event:
          type: string
          enum:
            - processed
            - dropped
            - delivered
            - deferred
            - bounce
            - blocked
            - open
            - click
            - spamreport
            - unsubscribe
        ip:
          type: string
        response:
          type: string
        sg_event_id:
          type: string
        sg_message_id:
          type: string
        smtp_id:
          type: string
        timestamp:
          type: integer
          format: int64
        tls:
          type: integer
          enum: [0, 1]
        send_at:
          type: integer
          description: Unix timestamp for scheduled send time
        notificationId:
          type: string
        sequenceId:
          type: string